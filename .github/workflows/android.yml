name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Rename APK to AutoLedger
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/AutoLedger-debug.apk

      - name: Upload APK            # ← uploaded before tests run; UT failure cannot block this
        uses: actions/upload-artifact@v5
        with:
          name: AutoLedger-debug
          path: app/build/outputs/apk/debug/AutoLedger-debug.apk

      - name: Run Unit Tests        # ← failure marks step orange but does not fail the workflow
        continue-on-error: true
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Upload Test Results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
